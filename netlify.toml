[build]
  publish = "."   
  command = ""         # no build command needed for plain HTML/CSS/JS

[build.environment]
  NODE_ENV = "production"

# Optimize & minify assets
[build.processing]
  skip_processing = false

[build.processing.js]
  bundle = true
  minify = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Security + no-cache headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# Redirects (optional — only needed if using client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
